<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<!-- QR -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<title>Birthday Story ❤️</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: 'Poppins', sans-serif;
}

/* STORY */
.story {
    position: absolute;
    width: 100%;
    height: 100%;
    display: none;
    justify-content: center;
    align-items: center;
    text-align: center;
    color: white;
}
.active { display: flex; }

/* BACKGROUND */
.bg-img, video {
    position: absolute;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: -1;
}

/* OVERLAY */
.overlay {
    background: rgba(0,0,0,0.4);
    padding: 25px;
    border-radius: 20px;
}

/* TEXT */
h1 {
    font-family: 'Great Vibes', cursive;
    font-size: 2.5rem;
}
p { font-size: 1.1rem; }

/* TAP */
.tap {
    position: absolute;
    width: 100%;
    height: 100%;
}

/* PROGRESS */
.progress {
    position: absolute;
    top: 0;
    left: 0;
    height: 4px;
    background: white;
    animation: progress 5s linear;
}
@keyframes progress {
    from {width:0;}
    to {width:100%;}
}

/* HEART */
.heart {
    position: absolute;
    color: red;
    animation: floatUp 5s linear infinite;
}
@keyframes floatUp {
    from {transform: translateY(100vh);}
    to {transform: translateY(-10vh);}
}

/* SPARKLE */
.sparkle {
    position: absolute;
    animation: sparkle 2s infinite;
}
@keyframes sparkle {
    0%,100%{opacity:0;}
    50%{opacity:1;}
}

/* BUTTON */
button {
    padding: 10px 20px;
    border-radius: 20px;
    border: none;
    background: white;
    color: red;
}
</style>
</head>

<body>

<!-- MUSIC -->
<audio autoplay loop>
    <source src="music.mp3" type="audio/mp3">
</audio>

<!-- STORY 1 -->
<div class="story active">
    <img class="bg-img" src="photo1.jpg">
    <div class="progress"></div>
    <div class="overlay">
        <h1>Happy Birthday ❤️</h1>
        <p>Tap to continue</p>
    </div>
    <div class="tap" onclick="nextStory()"></div>
</div>

<!-- STORY 2 -->
<div class="story">
    <img class="bg-img" src="photo2.jpg">
    <div class="progress"></div>
    <div class="overlay">
        <h1>Dear Anu 💖</h1>
        <p>You are my happiness 😊</p>
    </div>
    <div class="tap" onclick="nextStory()"></div>
</div>

<!-- STORY 3 VIDEO -->
<div class="story">
    <video autoplay muted loop>
        <source src="video.mp4" type="video/mp4">
    </video>
    <div class="progress"></div>
    <div class="overlay">
        <h1>Memories ✨</h1>
    </div>
    <div class="tap" onclick="nextStory()"></div>
</div>

<!-- STORY 4 -->
<div class="story">
    <img class="bg-img" src="photo3.jpg">
    <div class="progress"></div>
    <div class="overlay">
        <h1>🎤 Voice</h1>
        <button onclick="playAudio()">Play ▶️</button>
    </div>
    <div class="tap" onclick="nextStory()"></div>
</div>

<!-- FINAL STORY WITH QR -->
<div class="story">
    <img class="bg-img" src="photo4.jpg">
    <div class="overlay">
        <h1>I Love You ❤️</h1>
        <div id="qrcode"></div>
    </div>
</div>

<!-- VOICE -->
<audio id="voice">
    <source src="voice.mp3" type="audio/mp3">
</audio>

<script>
let current=0;
const stories=document.querySelectorAll(".story");

function nextStory(){
    stories[current].classList.remove("active");
    current++;
    if(current<stories.length){
        stories[current].classList.add("active");
    }
}

/* VOICE */
function playAudio(){
    document.getElementById("voice").play();
}

/* HEARTS */
setInterval(()=>{
    let h=document.createElement("div");
    h.className="heart";
    h.innerHTML="❤️";
    h.style.left=Math.random()*100+"vw";
    h.style.fontSize=(Math.random()*20+10)+"px";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),5000);
},300);

/* SPARKLES */
setInterval(()=>{
    let s=document.createElement("div");
    s.className="sparkle";
    s.innerHTML="✨";
    s.style.left=Math.random()*100+"vw";
    s.style.top=Math.random()*100+"vh";
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),2000);
},500);

/* QR CODE */
new QRCode(document.getElementById("qrcode"), {
    text: "https://your-site.netlify.app",
    width: 140,
    height: 140
});
</script>

</body>
</html>
